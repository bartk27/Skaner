<script>


let plomby=[];

let scanner=null;



function startScanner(){


if(scanner)
return;


scanner=new Html5Qrcode("reader");



scanner.start(

facingMode:"environment"
},

{
fps:10,
qrbox:250
},


(kod)=>{

dodajPlombe(kod);

},

}


).catch(function(err){

document.getElementById("komunikat").innerHTML=
"Brak dostępu do aparatu: "+err;

});


}





function stopScanner(){


if(scanner){


scanner.stop().then(()=>{


scanner.clear();

scanner=null;


});


}


}

&&
!kod.startsWith("05")
){

"❌ Nieprawidłowa plomba";


info.className="blok";


return;

}





if(
plomby.some(x=>x.kod===kod)
){

"⚠️ Ta plomba była już zeskanowana";


info.className="blok";


return;

}





plomby.push({

kod:kod,

czas:new Date().toLocaleString()

});



info.innerHTML=
"✅ Dodano "+kod;


info.className="ok";


aktualizuj();


}
